# FlexWorld main_3dgs.py config — copy to FlexWorld/configs/examples/
# Or run: bash install_flexworld_addons.sh
#
# Before running main_3dgs.py, copy your source image to:
#   ${FLEXWORLD_DIR}/assets/gemini_painting.png
# (submit_flexworld_3dgs.slurm does this automatically from destylized output.)

name: gemini_painting
input_image_path: ./assets/gemini_painting.png
text_fg: ''
text_bg: ''

# basicsr (Real-ESRGAN) imports torchvision.transforms.functional_tensor, removed in torchvision>=0.15.
# Disabling SR avoids SRTool / basicsr on GPU nodes; main_3dgs still trains 3DGS without upsampling.
sr: False

inpaint:
  inpaint_bg_path: ./cache/inpaint_bg_${name}.png
  outpainting: False
  outpaint_image_path: ./cache/outpaint_${name}.png

diffusion:
  cogvideo:
    prompt: >-
      A detailed painting of an outdoor plaza or courtyard with classical architecture,
      warm daylight, cobblestones, trees, and people in the distance; coherent perspective,
      sharp edges, photorealistic materials, no blur.
